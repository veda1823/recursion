<body>
    <h3>Table Example: Spanning Rows and Columns</h3>
    <table border="3" >
        <caption>A more complex sample table</caption>

            <td rowspan="2"><img src="camel.jpg" alt="camel image" height="200" width="150"></td>
            <td colspan="4" align="center">Camelid comparison <br> Approximate as of 6/2011</td>
        </tr>
        <tr>
            <td># of humps</td>
            <td>Indigenous region</td>
            <td>Spits?</td>
            <td>Produces wool?</td>
        </tr>
        <tr>
            <td>Camels(bactrian)</td>
            <td>2</td>
            <td>African/Asia</td>
            <td>Yes</td>
            <td>Yes</td>
        </tr>
        <tr>
            <td>Llamas</td>
            <td>1</td>
            <td>Andes Mountains</td>
            <td>Yes</td>
            <td>Yes</td>
        </tr>
    </table>
</body>
